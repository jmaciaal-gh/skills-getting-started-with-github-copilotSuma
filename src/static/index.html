<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aplicación para sumar números</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Aplicación para sumar números</h1>
      <h2>Calculadora simple</h2>
    </header>

    <main>
      <section id="sum-container">
        <h3>Sumar dos números</h3>
        <form id="sum-form">
          <div class="form-group">
            <label for="first-number">Primer número:</label>
            <input type="number" id="first-number" required step="any" />
          </div>
          <div class="form-group">
            <label for="second-number">Segundo número:</label>
            <input type="number" id="second-number" required step="any" />
          </div>
          <button type="submit">Sumar</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Calculadora</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
